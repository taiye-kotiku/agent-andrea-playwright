services:
  agent-andrea:
    build: .
    container_name: agent-andrea
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TZ=Europe/Rome
    shm_size: "2g"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 4G
